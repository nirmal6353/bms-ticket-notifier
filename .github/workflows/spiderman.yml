name: SpiderMan Ticket Checker

env:
  STATE_FILE: spiderman_state.json

on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:  # Manual trigger button

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run checker
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          BMS_URL: https://in.bookmyshow.com/movies/hyderabad/spiderman-brand-new-day/ET00447840
          BMS_DATES: 20260730,20260801,20260802
          BMS_THEATRE: ALLU,Prasads,AMB
          BMS_TIME: morning,afternoon,evening,night
        run: uv run main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bms_state.json
          git diff --cached --quiet || (git commit -m "chore: update bms_state.json [skip ci]" && git push)
